spring:
  application:
    name: "gatewayserver"
  config:
    import: "optional:configserver:http://localhost:8071/"
  # To tell gateway server to connect to eureka server to get service discovery details -->
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: false
              # To allow lower case on the microservice name in the url
              lower-case-service-id: true

  # Temporarily disabling rabbitmq dependencies
  # rabbitmq:
  #   host: "localhost"
  #   port: 5672
  #   username: "guest"
  #   password: "guest"

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    gateway:
      access: unrestricted
  info:
    env:
      enabled: true
eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8070/eureka/

# Helps in display of the Eureka Dashboard
info:
  app:
    name: "gatewayserver"
    description: "Banking gateway server application"
    version: "1.0.0"


logging:
  level:
    com:
      banking:
        gatewayserver: DEBUG

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10 # how many requests it should check and analyse before transition to another state.
        failure-rate-threshold: 50 # Threshold limit in percentage. When it crosses 50% failures it will transition
        permitted-number-of-calls-in-half-open-state: 2 # No. of calls permitted when the service is in half-open state
        wait-duration-in-open-state:
          seconds: 10000 # wait for 10s before moving to half open state